<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Скачивание файлов</title>
    <style>
        body { font-family: sans-serif; margin: 30px; }
        .nav { margin-bottom: 20px; }
        .card { border: 1px solid #ccc; padding: 20px; border-radius: 8px; width: 420px; }
        button { padding: 10px 15px; font-size: 16px; cursor: pointer; }
        button:disabled { cursor: not-allowed; opacity: 0.6; }
        .badge { 
            padding: 3px 8px; 
            border-radius: 4px; 
            font-size: 12px; 
            color: #fff; 
            font-weight: bold;
            margin-right: 5px;
        }
        .bg-info { background-color: #0d6efd; }
        .bg-warning { background-color: #ffc107; color: #000; }
        .bg-success { background-color: #198754; }
        .bg-danger { background-color: #dc3545; }
        .bg-secondary { background-color: #6c757d; }
    </style>
</head>
<body>
    <div class="nav">
        <strong>Страница скачивания</strong> | <a href="/files">Скачанные файлы</a>
    </div>

    <h2>Процесс скачивания каталога</h2>

    <div class="card">
        <button id="startBtn" onclick="startDownload()" {% if is_running %}disabled{% endif %}>Скачать данные</button>
        <hr>
        <p><strong>Статус:</strong> <span id="msg">{{ status_message }}</span></p>
        <p><strong>Время старта (НСК):</strong> <span id="startTime">{{ start_time_nsk or 'Не запущен' }}</span></p>
        <p><strong>Метрика:</strong> Получено <span id="foundN">{{ found_names_count }}</span> названий файлов, скачано
            <span id="downM">{{ downloaded_count }}</span></p>
    </div>

    <script>
        async function startDownload() {
            try {
                document.getElementById('startBtn').disabled = true;
                await fetch('/api/start-download', { method: 'POST' });
                updateStatus();
            } catch (e) {
                console.error("Ошибка запуска:", e);
            }
        }

        async function updateStatus() {
            try {
                const res = await fetch('/api/download-status');
                if (!res.ok) return;

                const data = await res.json();

                // Читаем ровно те поля, что объявлены в download_state
                const statusMsg = data.status_message || "Процесс не запущен";
                const startTime = data.start_time_nsk || "Не запущен";
                const foundN = data.found_names_count || 0;
                const downM = data.downloaded_count || 0;
                const isRunning = data.is_running || false;

                // Обновляем элементы DOM
                document.getElementById('msg').innerText = statusMsg;
                document.getElementById('startTime').innerText = startTime;
                document.getElementById('foundN').innerText = foundN;
                document.getElementById('downM').innerText = downM;
                document.getElementById('startBtn').disabled = isRunning;

            } catch (err) {
                console.error("Ошибка обновления статуса:", err);
            }
        }

        // Запускаем периодический опрос каждые 1.5 секунды
        setInterval(updateStatus, 1500);
    </script>
</body>
</html>
